<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史高光</title>
  <!-- 引入Video.js CSS -->
  <link href="https://vjs.zencdn.net/7.15.4/video-js.css" rel="stylesheet" />
  <!-- 引入Video.js JS -->
  <script src="https://vjs.zencdn.net/7.15.4/video.min.js"></script>
  <style>
    /* 原始HTML风格样式 */
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f0f0f0;
      color: #333;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      padding: 30px 0;
      background-color: #333;
      color: white;
      border: 1px solid #000;
    }

    header h1 {
      font-size: 2em;
      margin: 0;
      font-weight: bold;
    }

    header p {
      font-size: 1em;
      margin: 10px 0 0 0;
    }

    .highlights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .highlight-card {
      background-color: white;
      border: 1px solid #ccc;
      padding: 15px;
    }

    .cover-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border: 1px solid #ddd;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .cover-image.loading {
      opacity: 0;
    }

    .image-container {
      position: relative;
      width: 100%;
      height: 200px;
      background-color: #f0f0f0;
      border: 1px solid #ddd;
    }

    .loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #333;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .card-content {
      padding: 15px 0;
    }

    .card-content h3 {
      font-size: 1.2em;
      margin: 0 0 10px 0;
      color: #333;
    }

    .card-content p {
      color: #666;
      margin: 0;
    }

    .play-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background-color: #333;
      color: white;
      border: 1px solid #000;
      cursor: pointer;
      font-size: 1em;
      text-align: center;
    }

    .play-btn:hover {
      background-color: #555;
    }

    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .video-wrapper {
      position: relative;
      width: 90%;
      max-width: 800px;
    }

    .video-wrapper video {
      width: 100%;
      border: 1px solid #ccc;
    }

    .close-btn {
      position: absolute;
      top: -30px;
      right: 0;
      background-color: #333;
      color: white;
      border: 1px solid #000;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 1em;
    }

    /* 响应式布局 */
    @media (max-width: 768px) {
      .highlights-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      header h1 {
        font-size: 1.5em;
      }

      .highlight-card {
        max-width: 100%;
      }

      .cover-image {
        height: 150px;
      }

      .image-container {
        height: 150px;
      }

      .container {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="page-title">历史高光</h1>
      <p>偷着乐</p>
    </header>

    <div class="highlights-grid" id="highlights-container">
      <!-- 动态生成内容 -->
    </div>
  </div>

  <div class="video-container" id="video-container" style="display: none;">
    <div class="video-wrapper">
      <button class="close-btn" id="close-btn">&times;</button>
      <video id="video-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
        <p class="vjs-no-js">
          要观看此视频，请启用JavaScript，并考虑升级到支持HTML5视频的Web浏览器
        </p>
      </video>
    </div>
  </div>

  <script>
    // 配置数据
    const config = {
      "title": "历史高光",
      "highlights": [
        {
          "id": 1,
          "title": "直播间kmj",
          "description": "随机在ks同城直播间发语音kmj（きもちいい 真舒服）主播播放导致下播",
          "coverImage": "https://i.ibb.co/bRqgZVnj/Screen-Shot-2026-03-09-180151-583.png",
          "videoUrl": "./mp4/zbkmj.mp4"
        },
         {
          "id": 2,
          "title": "敬请期待",
          "description": "敬请期待",
          "coverImage": "",
          "videoUrl": ""
        },
      ]
    };

    // 当前播放器实例
    let currentPlayer = null;

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', function() {
      // 渲染页面内容
      renderContent();
      
      // 绑定关闭按钮事件
      bindCloseEvents();
    });

    // 渲染页面内容
    function renderContent() {
      // 更新页面标题
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) {
        pageTitle.textContent = config.title;
        document.title = config.title;
      }
      
      // 渲染高光内容
      const container = document.getElementById('highlights-container');
      if (container) {
        container.innerHTML = '';
        
        config.highlights.forEach(highlight => {
          const card = document.createElement('div');
          card.className = 'highlight-card';
          
          // 检查是否有封面图片
          const hasCoverImage = highlight.coverImage && highlight.coverImage.trim() !== '';
          const coverImageHTML = hasCoverImage ? 
            `<img class="cover-image loading" src="${highlight.coverImage}" alt="${highlight.title}" data-video="${highlight.videoUrl}">` : 
            '<div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #999;">暂无封面</div>';
          
          // 检查是否有视频URL
          const hasVideoUrl = highlight.videoUrl && highlight.videoUrl.trim() !== '';
          const playButtonHTML = hasVideoUrl ? 
            `<button class="play-btn" data-video="${highlight.videoUrl}">播放视频</button>` : 
            '<button class="play-btn" disabled style="background-color: #999; cursor: not-allowed;">敬请期待</button>';
          
          card.innerHTML = `
            <div class="image-container">
              ${hasCoverImage ? '<div class="loading-spinner"></div>' : ''}
              ${coverImageHTML}
            </div>
            <div class="card-content">
              <h3>${highlight.title}</h3>
              <p>${highlight.description}</p>
              ${playButtonHTML}
            </div>
          `;
          container.appendChild(card);
        });

        // 为图片添加加载完成事件
        document.querySelectorAll('.cover-image').forEach(img => {
          img.addEventListener('load', function() {
            this.classList.remove('loading');
            const spinner = this.parentElement.querySelector('.loading-spinner');
            if (spinner) {
              spinner.style.display = 'none';
            }
          });
        });

        // 绑定事件监听器
        bindVideoEvents();
      }
    }

    // 绑定视频播放相关事件
    function bindVideoEvents() {
      // 封面图片点击事件
      document.querySelectorAll('.cover-image').forEach(img => {
        img.addEventListener('click', function() {
          const videoUrl = this.getAttribute('data-video');
          if (videoUrl && videoUrl.trim() !== '') {
            openVideo(videoUrl);
          }
        });
      });

      // 播放按钮点击事件
      document.querySelectorAll('.play-btn').forEach(btn => {
        if (!btn.hasAttribute('disabled')) {
          btn.addEventListener('click', function() {
            const videoUrl = this.getAttribute('data-video');
            if (videoUrl && videoUrl.trim() !== '') {
              openVideo(videoUrl);
            }
          });
        }
      });
    }

    // 绑定关闭相关事件
    function bindCloseEvents() {
      // 关闭按钮点击事件
      const closeBtn = document.getElementById('close-btn');
      if (closeBtn) {
        closeBtn.addEventListener('click', function() {
          closeVideo();
        });
      }

      // 点击视频容器外部关闭
      const videoContainer = document.getElementById('video-container');
      if (videoContainer) {
        videoContainer.addEventListener('click', function(e) {
          if (e.target === this) {
            closeVideo();
          }
        });
      }
    }

    // 打开视频
    function openVideo(videoUrl) {
      try {
        // 验证视频URL
        if (!videoUrl || videoUrl.trim() === '') {
          alert('视频链接无效，请稍后再试');
          return;
        }
        
        // 确保先关闭之前的视频
        closeVideo();
        
        // 获取视频容器和包装器
        const videoContainer = document.getElementById('video-container');
        const videoWrapper = document.querySelector('.video-wrapper');
        
        if (!videoContainer || !videoWrapper) {
          console.error('视频容器或包装器不存在');
          return;
        }
        
        // 移除旧的video元素
        const oldVideoElement = document.getElementById('video-player');
        if (oldVideoElement) {
          videoWrapper.removeChild(oldVideoElement);
        }
        
        // 创建新的Video.js视频元素
        const newVideoElement = document.createElement('video');
        newVideoElement.id = 'video-player';
        newVideoElement.className = 'video-js vjs-default-skin vjs-big-play-centered';
        newVideoElement.controls = true;
        newVideoElement.innerHTML = '<p class="vjs-no-js">要观看此视频，请启用JavaScript，并考虑升级到支持HTML5视频的Web浏览器</p>';
        
        // 插入新的视频元素
        const closeBtn = document.getElementById('close-btn');
        if (closeBtn) {
          videoWrapper.insertBefore(newVideoElement, closeBtn);
        } else {
          videoWrapper.appendChild(newVideoElement);
        }
        
        // 初始化Video.js播放器
        currentPlayer = videojs('video-player', {
          controls: true,
          autoplay: true,
          preload: 'auto',
          responsive: true,
          fluid: true
        });
        
        // 添加错误处理
        currentPlayer.on('error', function() {
          console.error('视频加载失败:', currentPlayer.error());
          alert('视频加载失败，可能是因为网络问题或格式不支持');
          closeVideo();
        });
        
        // 设置视频源并播放
        currentPlayer.src(videoUrl);
        currentPlayer.play();
        
        // 显示视频容器
        videoContainer.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      } catch (error) {
        console.error('打开视频失败:', error);
        // 显示错误消息
        alert('视频播放失败，请稍后再试');
      }
    }

    // 关闭视频
    function closeVideo() {
      try {
        // 停止视频并释放播放器
        if (currentPlayer) {
          currentPlayer.pause();
          currentPlayer.dispose();
          currentPlayer = null;
        }
        
        // 获取视频容器和包装器
        const videoContainer = document.getElementById('video-container');
        const videoWrapper = document.querySelector('.video-wrapper');
        
        if (!videoContainer || !videoWrapper) {
          return;
        }
        
        // 移除旧的video元素
        const oldVideoElement = document.getElementById('video-player');
        if (oldVideoElement) {
          videoWrapper.removeChild(oldVideoElement);
        }
        
        // 创建新的Video.js视频元素
        const newVideoElement = document.createElement('video');
        newVideoElement.id = 'video-player';
        newVideoElement.className = 'video-js vjs-default-skin vjs-big-play-centered';
        newVideoElement.controls = true;
        newVideoElement.innerHTML = '<p class="vjs-no-js">要观看此视频，请启用JavaScript，并考虑升级到支持HTML5视频的Web浏览器</p>';
        
        // 插入新的视频元素
        const closeBtn = document.getElementById('close-btn');
        if (closeBtn) {
          videoWrapper.insertBefore(newVideoElement, closeBtn);
        } else {
          videoWrapper.appendChild(newVideoElement);
        }
        
        // 隐藏视频容器
        videoContainer.style.display = 'none';
        document.body.style.overflow = 'auto';
      } catch (error) {
        console.error('关闭视频失败:', error);
      }
    }
  </script>
</body>
</html>
